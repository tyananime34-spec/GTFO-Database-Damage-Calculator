<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GTFO Database & Damage Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;900&display=swap" rel="stylesheet">
<style>
    /* 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И БАЗОВЫЕ СТИЛИ */
    :root {
        --bg-deep: #121212;
        --bg-panel: #1e1e1e;
        --bg-list: #181818;
        --accent: #ffffff;
        --text-dim: #777777;
        --glow: 0 0 10px rgba(255,255,255,0.2);
        
        --item-height: 85px;
        --calc-width: 340px;
        --main-width: 1020px;
        --main-height: 756px;
        --card-height: 60px; 
    }

    * { 
        box-sizing: border-box; 
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
    }
    
    body {
        background-color: var(--bg-deep);
        color: var(--accent);
        font-family: 'Exo 2', sans-serif;
        height: 100vh; margin: 0;
        display: flex; justify-content: center; align-items: center;
        text-transform: uppercase; overflow: hidden;
    }

    /* 2. ЭФФЕКТЫ ТЕРМИНАЛА (CRT, СКАНЕР, АНИМАЦИИ) */
    .crt-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.10) 50%);
        background-size: 100% 4px;
        z-index: 9999;
        pointer-events: none;
        animation: flicker 0.15s infinite;
    }

    .scanner-grid {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), 
                          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 15px 15px; z-index: 1; pointer-events: none;
    }

    .scanner-line {
        position: absolute; left: 0; right: 0; height: 2px;
        background: rgba(255, 255, 255, 0.6); box-shadow: 0 0 10px #fff;
        z-index: 5; pointer-events: none; animation: scan 2.5s linear infinite;
    }

    @keyframes flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.98; } }
    @keyframes scan { 0% { top: -5%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 105%; opacity: 0; } }

    /* 3. ОБЩАЯ СТРУКТУРА ЛЕЙАУТА */
    .terminal-layout-train { position: relative; width: var(--main-width); height: var(--main-height); display: flex; }
    .terminal-layout-train.open { transform: translateX(calc(var(--calc-width) / -2)); }

    .main-container { display: flex; flex-direction: column; width: var(--main-width); height: 100%; z-index: 10; flex-shrink: 0; }
    .main-frame { display: flex; flex: 1; border: 2px solid var(--accent); background: var(--bg-panel); height: calc(100% - 42px); overflow: hidden; position: relative; }

    /* 4. НАВИГАЦИЯ (ВКЛАДКИ) */
    .tabs-nav { display: flex; gap: 4px; height: 42px; }
    .tab-btn { cursor: pointer; padding: 12px 25px; color: var(--text-dim); font-weight: 900; border: 2px solid var(--accent); border-bottom: none; background: var(--bg-panel); font-size: 13px; }
    .tab-btn.active { color: #fff; background: rgba(255,255,255,0.1); box-shadow: inset 0 3px 0 #fff; }

    /* 5. СПИСОК ОРУЖИЯ / ВРАГОВ (ЛЕВАЯ ПАНЕЛЬ) */
    .weapon-list { width: 300px; border-right: 2px solid var(--accent); overflow-y: auto; background: var(--bg-list); height: 100%; position: relative; z-index: 2; }
    .weapon-item { height: var(--item-height); padding: 0 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .weapon-item.active { background: #333; }
    .weapon-item h3 { margin: 0; font-size: 16px; font-weight: 900; line-height: 1.1; }
    .weapon-item p { margin: 2px 0 0 0; font-size: 11px; color: var(--text-dim); font-weight: 900; letter-spacing: 2px; }
    .weapon-item .list-icon { width: 45px; opacity: 0.5; filter: grayscale(1); object-fit: contain; }
    .weapon-item.active .list-icon { opacity: 1; filter: grayscale(0) drop-shadow(0 0 5px rgba(255,255,255,0.3)); }

    /* 6. ИНФОРМАЦИОННАЯ ПАНЕЛЬ (ЦЕНТР) */
    .info-pane { width: 720px; padding: 15px 25px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
    
    .header { margin-bottom: 5px; text-align: center; height: 90px; display: flex; flex-direction: column; justify-content: center; }
    .header h1 { margin: 0; font-size: 38px; font-weight: 900; line-height: 1; letter-spacing: 2px; }
    .header h2 { margin: 2px 0 0 0; font-size: 16px; color: var(--text-dim); letter-spacing: 2px; min-height: 18px; }
    .header h3 { margin: 0px 0 0 0; font-size: 14px; color: var(--text-dim); letter-spacing: 4px; min-height: 16px; font-weight: 600; }

    /* Рамка изображения и углы */
    .icon-target-box { position: relative; padding: 12px; display: inline-flex; }
    .inner-frame { border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4); padding: 10px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
    .inner-frame img { height: 210px; max-width: 480px; object-fit: contain; position: relative; z-index: 10; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }

    .corner { position: absolute; width: 14px; height: 14px; border: 4px solid var(--accent); box-shadow: var(--glow); }
    .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
    .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
    .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
    .br { bottom: 0; right: 0; border-left: none; border-top: none; }

    /* 7. СЕТКА ХАРАКТЕРИСТИК И КАРТОЧКИ */
    .stats-grid { display: grid; gap: 10px; width: 100%; margin-top: auto; }
    .info-pane .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .info-pane .stats-grid.col-1 { grid-template-columns: 1fr; }

    .stat-card { 
        background: #282828; 
        border: 1px solid #383838; 
        padding: 10px 15px; 
        border-left: 5px solid var(--accent); 
        height: var(--card-height); 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; /* Центрирование содержимого */
        text-align: center; 
        cursor: help; 
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
    }
    
    .stat-name { color: var(--text-dim); font-size: 9px; font-weight: 900; margin-bottom: 2px; width: 100%; display: flex; align-items: center; justify-content: center; }
    .stat-value { color: #fff; font-size: 16px; font-weight: 900; width: 100%; white-space: nowrap; }

    /* Особенности врагов */
    .stat-card.enemy-card { height: auto; min-height: var(--card-height); padding: 12px 15px; }
    .stat-list-item { margin-top: 4px; color: var(--accent); font-size: 13px; display: flex; align-items: center; }
    .stat-list-item::before { content: '▪'; color: var(--text-dim); margin-right: 6px; font-size: 10px; }

    /* 8. СТАТУСЫ ОПАСНОСТИ */
    :root {
        --dc1: transparent;
        --dc2: transparent;
    }
    .inner-frame.danger-single { border-color: var(--dc1) !important; animation: dangerPulse 2.5s infinite; }
    
    .inner-frame.danger-dual { 
        border-color: transparent !important; 
        animation: dangerDualPulse 2.5s infinite linear; 
    }
    
    .inner-frame.danger-dual::before { 
        content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
        background: conic-gradient(var(--dc1) 0%, var(--dc2) 50%, var(--dc1) 100%); 
        animation: dangerSpin 2.5s linear infinite; z-index: 0; 
    }
    .inner-frame.danger-dual::after { 
        content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; 
        background: #121212; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); z-index: 1; 
    }

    @keyframes dangerPulse { 
        0% { box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 0 0 transparent; } 
        50% { box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px 2px var(--dc1); } 
        100% { box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 0 0 transparent; } 
    }
	
	@keyframes dangerDualPulse {
        0% { box-shadow: 0 0 5px var(--dc1); }
        25% { box-shadow: 0 0 15px var(--dc1); }
        50% { box-shadow: 0 0 5px var(--dc2); }
        75% { box-shadow: 0 0 15px var(--dc2); }
        100% { box-shadow: 0 0 5px var(--dc1); }
    }
	
    @keyframes dangerSpin { 100% { transform: rotate(360deg); } }

    /* 9. МОДУЛЬ КАЛЬКУЛЯТОРА (ПРАВАЯ ПАНЕЛЬ) */
    .calc-module { position: absolute; left: 100%; top: 42px; height: 714px; width: var(--calc-width); z-index: 5; transform: translateX(-100%); }
    .terminal-layout-train.open .calc-module { transform: translateX(0); }
    .calc-body { width: 100%; height: 100%; background: var(--bg-list); border: 2px solid var(--accent); border-left: none; padding: 25px; display: flex; flex-direction: column; position: relative; }
    .calc-body .stats-grid { grid-template-columns: 1fr; }

    .calc-toggle-btn { position: absolute; left: 100%; top: 50%; transform: translateY(-50%); width: 42px; height: 200px; background: var(--bg-panel); border: 2px solid var(--accent); border-left: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; }
    .calc-toggle-btn span { writing-mode: vertical-rl; font-weight: 900; font-size: 13px; color: var(--text-dim); letter-spacing: 2px; }
    .calc-toggle-btn.active { background: rgba(255, 255, 255, 0.1); box-shadow: inset -4px 0 0 #fff; }
    .calc-toggle-btn.active span { color: #fff; }

    /* Элементы управления в калькуляторе */
    .calc-section { margin-bottom: 18px; width: 100%; }
    .form-control { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; font-family: 'Exo 2'; font-weight: 900; width: 100%; outline: none; margin-bottom: 15px; font-size: 12px; text-transform: uppercase; }
    
    #calcEnemyBox { display: none; margin-bottom: 15px; align-self: center; width: fit-content; text-align: center; }
    #calcEnemyBox .inner-frame { padding: 15px; width: 250px; flex-direction: column; }
    #calcEnemyBox .inner-frame img { height: 90px; max-width: 220px; width: auto; }

    .calc-disabled-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-list); z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
    .calc-disabled-overlay.visible { display: flex; }

    /* Слайдеры */
    .slider-header { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-align: center; font-weight: 900; letter-spacing: 1px; }
    .slider-header span { color: #fff; }
    .slider-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); font-weight: 900; }
    .slider-row span { width: 45px; text-align: center; flex-shrink: 0; }
    .custom-slider { -webkit-appearance: none; flex: 1; height: 4px; background: #444; outline: none; border-radius: 2px; }
    .custom-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: var(--glow); }

    /* 10. ВИЗУАЛЬНАЯ МОДЕЛЬ УРОНА */
    .visual-model { position: relative; width: 100%; height: 280px; background: url('img/striker_mask.png') center/contain no-repeat; }
    .dmg-point { position: absolute; font-size: 16px; font-weight: 900; text-align: center; }
    .dmg-head { color: #f77878; top: 50px; left: 75px; transform: translate(-50%, -50%); } 
    .dmg-body { color: #a8f778; top: 150px; left: 75px; transform: translate(-50%, -50%); } 
    .dmg-back { color: #ffe258; top: 150px; left: 215px; transform: translate(-50%, -50%); }
    .dmg-occiput { color: #c378f7; top: 50px; left: 215px; transform: translate(-50%, -50%); }

    /* Пульсирующие индикаторы */
    .pulse-kill { border: 1px solid rgba(220, 50, 50, 0.8); background: rgba(220, 50, 50, 0.1); animation: pulseRed 1.5s infinite; padding: 2px 5px; border-radius: 4px; display: inline-block; }
    .pulse-stun { border: 1px solid rgba(50, 150, 255, 0.8); background: rgba(50, 150, 255, 0.1); animation: pulseBlue 1.5s infinite; padding: 2px 5px; border-radius: 4px; display: inline-block; }
    
    @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(220, 50, 50, 0.5); } 70% { box-shadow: 0 0 0 5px rgba(220, 50, 50, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 50, 50, 0); } }
    @keyframes pulseBlue { 0% { box-shadow: 0 0 0 0 rgba(50, 150, 255, 0.5); } 70% { box-shadow: 0 0 0 5px rgba(50, 150, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(50, 150, 255, 0); } }

    .calc-legend { display: flex; justify-content: center; gap: 15px; margin-top: 5px; font-size: 9px; color: var(--text-dim); }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .mini-box { width: 8px; height: 8px; border-radius: 2px; }

    /* 11. ВСПОМОГАТЕЛЬНЫЕ КЛАССЫ И СКРОЛЛБАР */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); }
    
    .flipped-weapon { transform: rotate(120deg) scale(1.1) !important; }
    #mainImg, .list-icon { transition: none !important; }
</style>
</head>
<body>

<div class="crt-overlay"></div> 
    <div id="scaleWrapper" style="transform-origin: center center; display: flex; justify-content: center; align-items: center;">
        <div id="mainTrain" class="terminal-layout-train">
        <div class="main-container">
            <div class="tabs-nav" id="tabNav"></div>
            <div class="main-frame">
                <div id="wList" class="weapon-list"></div>
                <div class="info-pane">
                    <div class="header">
                        <h1 id="n1">-</h1>
                        <h2 id="n2">-</h2>
                        <h3 id="n3"></h3>
                    </div>
                    <div class="icon-target-box" id="mainImageFrame">
                        <div class="corner tl"></div><div class="corner tr"></div>
                        <div class="inner-frame" id="dangerFrame"><img id="mainImg" src=""></div>
                        <div class="corner bl"></div><div class="corner br"></div>
                    </div>
                    
                    <div id="dangerLevelBox" style="display: none; text-align: center; margin-top: 5px; margin-bottom: -15px;">
                        <div style="font-size: 9px; color: var(--text-dim); letter-spacing: 2px;">УРОВЕНЬ ОПАСНОСТИ</div>
                        <div id="dangerLevelText" style="font-size: 16px; font-weight: 900; letter-spacing: 2px; margin-top: 2px;"></div>
                    </div>
					<div id="mainSliderBox" style="display:none; width:100%; max-width:400px; margin-top: 15px; margin-bottom: -10px; flex-direction: column; align-items: center; z-index: 5;">
                        <div id="mainRangedUi" style="display:none; width:100%;">
                            <div class="slider-header" style="font-size:10px;">ДИСТАНЦИЯ ДО ВРАГА: <span id="mainDistValDisplay">0</span> М</div>
                            <div class="slider-row">
                                <span id="mainDistMin"></span>
                                <input type="range" id="mainDistSlider" min="0" max="100" value="0" class="custom-slider" oninput="syncSliders('dist', this.value)">
                                <span id="mainDistMax"></span>
                            </div>
                        </div>
                        <div id="mainMeleeUi" style="display:none; width:100%;">
                            <div class="slider-header" style="font-size:10px;">ЗАРЯДКА: <span id="mainChargeValDisplay">100</span> %</div>
                            <div class="slider-row">
                                <span>0 %</span>
                                <input type="range" id="mainChargeSlider" min="0" max="100" value="100" class="custom-slider" oninput="syncSliders('charge', this.value)">
                                <span>100 %</span>
                            </div>
                        </div>
                    </div>
                    <div id="statsGrid" class="stats-grid"></div>
                </div>
            </div>
        </div>

        <div class="calc-module">
            <div id="calcBtn" class="calc-toggle-btn" onclick="toggleCalc()"><span>РАСЧЕТ УРОНА</span></div>
            <div class="calc-body">
			<div id="calcDisabledOverlay" class="calc-disabled-overlay">
                    <div style="font-size: 40px; margin-bottom: 20px; opacity: 0.5;">⚠</div>
                    <div style="font-weight: 900; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px;">КАЛЬКУЛЯТОР НЕДОСТУПЕН</div>
                    <div style="font-size: 11px; color: var(--text-dim); line-height: 1.5;">В режиме справочника врагов расчеты не производятся.</div>
                    <div style="font-size: 9px; margin-top: 20px; opacity: 0.4;">ВЫБЕРИТЕ КАТЕГОРИЮ ОРУЖИЯ</div>
                </div>
                <select id="enemySelect" class="form-control" onchange="updateCalcByEnemy()"></select>
            
                <div id="calcEnemyBox" class="icon-target-box">
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="inner-frame" id="enemyFrameContent"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                </div>

                <div id="rangedUi" style="display: none; width: 100%;">
                    <div id="distContainer" class="calc-section">
                        <div class="slider-header">ДИСТАНЦИЯ ДО ВРАГА: <span id="distValDisplay"></span> М</div>
                        <div class="slider-row">
                            <span id="distMinSpan"></span>
                            <input type="range" id="distSlider" min="0" max="100" value="0" class="custom-slider" oninput="syncSliders('dist', this.value)">
                            <span id="distMaxSpan"></span>
                        </div>
                    </div>
                </div>

                <div id="meleeUi" style="display: none; width: 100%;">
                    <div class="calc-section">
                        <div class="slider-header">ЗАРЯДКА: <span id="chargeValDisplay">100</span> %</div>
                        <div class="slider-row">
                            <span>0 %</span>
                            <input type="range" id="meleeCharge" min="0" max="100" value="100" class="custom-slider" oninput="syncSliders('charge', this.value)">
                            <span>100 %</span>
                        </div>
                    </div>

                    <div class="calc-section">
                        <label style="font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #fff; font-weight: 900; letter-spacing: 1px;">
                            <input type="checkbox" id="meleeSleep" onchange="updateCalcByEnemy()" style="width: 16px; height: 16px; accent-color: var(--accent);"> УДАР ПО СПЯЩЕМУ
                        </label>
                    </div>
                </div>

                <div id="calcOutputs" class="stats-grid"></div>
            </div>
        </div>
    </div>
</div>
<script>
let curWeaponMode = "", curWeaponData = null, isCalcOpen = false;

const awakeEnemies = [
    "SCOUT", 
    "CHARGER SCOUT", 
    "SHADOW SCOUT"
];

const descriptions = {
    "УРОН": "Количество единиц урона, наносимое за одно попадание в базовую зону.",
    "ТОЧНОЕ ПОПАДАНИЕ": "(Precision Damage) Множитель и финальное значение урона при поражении уязвимых зон.",
    "ШОКОВЫЙ УРОН": "(Stagger Damage) Множитель и финальное значение урона по стойкости врага.",
    "БОЕЗАПАС": "Количество патронов в магазине и максимальный запас в резерве.",
    "ОБЩИЙ УРОН": "Потенциал суммарного урона, который можно нанести при отстреле всего боезапаса.",
    "ПЕРЕЗАРЯДКА": "Время, необходимое для смены магазина и приведения оружия в боевую готовность.",
    "УРОН В СЕКУНДУ": "Показатель DPS (Damage Per Second) при непрерывной стрельбе без учета перезарядки.",
    "СКОРОСТРЕЛЬНОСТЬ": "Количество выстрелов, которое оружие способно произвести за одну минуту.",
    "ДИСТАНЦИЯ СПАДА УРОНА": "Эффективная дальность стрельбы: дистанция начала падения урона и точка его минимального значения.",
	"ВРЕМЯ ЗАРЯДКИ": "Интервал между нажатием спускового крючка и фактическим выстрелом.",
    "ПРОБИТИЕ": "Способность пули проходить сквозь цели, поражая нескольких противников за один выстрел.",
    "ФОНАРИК": "Максимальная дистанция эффективного освещения пространства.",
	
	"ДИСТАНЦИЯ ОБНАРУЖЕНИЯ": "Максимальный радиус сканирования, на котором сенсоры турели фиксируют движение.",
    "УГОЛ ОБНАРУЖЕНИЯ": "Эффективный угол обзора (конус сканирования), в пределах которого турель реагирует на врагов.",
    "ВРЕМЯ ОБНАРУЖЕНИЯ": "Системная задержка между фиксацией цели и открытием огня (Базовое / С биотрекером).",
	
    "ЗДОРОВЬЕ": "Суммарный запас жизненных сил противника до его полной ликвидации.",

// Генерация карточки с авто-буквами
function createStatCard(name, value, cat = "") {
    const hint = descriptions[name] || "";
    const iconEmoji = statIcons[name] || "▪";
    const icon = `<span style="font-size: 18px; margin-right: 4px; display: inline-flex; align-items: center; justify-content: center; width: 20px; flex-shrink: 0;">${iconEmoji}</span>`;
    let displayValue = String(value);

    // Логика биотрекера: поднимаем ДНК и убираем влияние на высоту строки
    if (cat === "УСТРОЙСТВА" && (name === "БОЕЗАПАС" || name === "ВРЕМЯ ОБНАРУЖЕНИЯ" || name === "ОБЩИЙ УРОН")) {
        if (displayValue.includes('/')) {
            let parts = displayValue.split('/');
            displayValue = `${parts[0]} / <span style="color: #a8f778; font-weight: 900;">${parts[1]}</span> <span style="font-size: 16px; margin-left: -4px; line-height: 0;">🧬</span>`;
        }
    }
    
    // Авто-генерация единиц измерения
    const unitMap = { "ПЕРЕЗАРЯДКА": "СЕК", "УРОН В СЕКУНДУ": "DPS", "СКОРОСТРЕЛЬНОСТЬ": "RPM", "ДИСТАНЦИЯ СПАДА УРОНА": "М", "ФОНАРИК": "М", "ДИСТАНЦИЯ ОБНАРУЖЕНИЯ": "М", "УГОЛ ОБНАРУЖЕНИЯ": "°", "ВРЕМЯ ОБНАРУЖЕНИЯ": "СЕК", "ДИСТАНЦИЯ": "М", "ВРЕМЯ ЗАМАХА": "СЕК", "ВРЕМЯ УДЕРЖАНИЯ ЗАМАХА": "СЕК" };
    if (unitMap[name]) {
        let u = unitMap[name];
        displayValue += (name === "УГОЛ ОБНАРУЖЕНИЯ") ? `<span style="color: var(--text-dim); font-size: inherit;">${u}</span>` : ` <span style="font-size: 10px; color: var(--text-dim);">${u}</span>`;
    } else if (name === "ВРЕМЯ ЗАРЯДКИ" && displayValue.trim() !== "-") {
        displayValue += ` <span style="font-size: 10px; color: var(--text-dim);">СЕК</span>`;
    }

    return `
        <div class="stat-card" title="${hint}" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
            <div class="stat-name" style="display: flex; align-items: center; justify-content: center; width: 100%;">${icon} ${name}</div>
            <div class="stat-value" style="width: 100%; white-space: nowrap;">${displayValue}</div>
        </div>`;
}

let lastWeaponId = "";

// Математика для ББ (парсит 3/12 в зависимости от ползунка)
function parseMeleeValue(str, pct) {
    if (!str || !String(str).includes('/')) return str;
    let parts = String(str).split('/');
    let minStr = parts[0].replace(/[x×]/g, '').trim();
    let maxStr = parts[1].replace(/[x×]/g, '').trim();
    let min = parseFloat(minStr), max = parseFloat(maxStr);
    if (isNaN(min) || isNaN(max)) return str;
    
    let current = min + (max - min) * pct;
    let res = parseFloat(current.toFixed(2)).toString(); 
    return (String(str).includes('×') || String(str).includes('x')) ? `×${res}` : res;
}

// Математика для дистанции
function modifyRangedStat(str, distMult) {
    if (!str || str === "-") return str;
    let strVal = String(str);
    let isEquation = strVal.includes('=');
    let numPart = isEquation ? strVal.split('=')[1] : strVal;
    let val = parseFloat(numPart.replace(/[^\d.]/g, '').trim());
    if (isNaN(val)) return str;
    let res = parseFloat((val * distMult).toFixed(2)).toString();
    return isEquation ? (strVal.split('=')[0] + "= " + res) : res;
}

// Синхронизатор ползунков
function syncSliders(type, val) {
    if (type === 'dist') {
        document.getElementById('mainDistSlider').value = val;
        let cS = document.getElementById('distSlider'); if(cS) cS.value = val;
        document.getElementById('mainDistValDisplay').innerText = val;
        let cD = document.getElementById('distValDisplay'); if(cD) cD.innerText = val;
    } else if (type === 'charge') {
        document.getElementById('mainChargeSlider').value = val;
        let cS = document.getElementById('meleeCharge'); if(cS) cS.value = val;
        document.getElementById('mainChargeValDisplay').innerText = val;
        let cD = document.getElementById('chargeValDisplay'); if(cD) cD.innerText = val;
    }
    renderStatsGrid();
    updateCalcByEnemy();
}

// Динамическая отрисовка сетки
function renderStatsGrid() {
    const grid = document.getElementById('statsGrid'); 
    grid.innerHTML = '';
    grid.className = (curWeaponMode === "ВРАГИ") ? "stats-grid col-1" : "stats-grid";

    let statsToRender = { ...curWeaponData.stats };

    if (curWeaponMode === "ВРАГИ") {
        if (statsToRender["ОПАСНОСТЬ"]) delete statsToRender["ОПАСНОСТЬ"];
        Object.entries(statsToRender).forEach(([name, val]) => grid.innerHTML += createStatCard(name, val, curWeaponMode));
        return;
    }

    if (curWeaponMode === "ОРУЖИЕ БЛИЖНЕГО БОЯ") {
        let chargePct = parseFloat(document.getElementById('mainChargeSlider').value) / 100;
        Object.keys(statsToRender).forEach(key => statsToRender[key] = parseMeleeValue(statsToRender[key], chargePct));
    } else {
        let distSlider = document.getElementById('mainDistSlider');
        let falloff = statsToRender["ДИСТАНЦИЯ СПАДА УРОНА"];
        if (falloff && falloff !== "-" && falloff.includes('/')) {
            let parts = falloff.replace('М', '').trim().split('/');
            let dStart = parseFloat(parts[0]), dEnd = parseFloat(parts[1]);
            let currentDist = parseFloat(distSlider.value);
            let distMult = Math.max(0.1, Math.min(1.0, 1.0 - 0.9 * ((currentDist - dStart) / (dEnd - dStart))));
            if (distMult < 1.0) {
                statsToRender["УРОН"] = modifyRangedStat(statsToRender["УРОН"], distMult);
                statsToRender["ОБЩИЙ УРОН"] = modifyRangedStat(statsToRender["ОБЩИЙ УРОН"], distMult);
                statsToRender["УРОН В СЕКУНДУ"] = modifyRangedStat(statsToRender["УРОН В СЕКУНДУ"], distMult);
            }
        }
    }

    let baseDmgNum = 0;
    let dmgStr = String(statsToRender["УРОН"] || "0");
    if (dmgStr.includes('=')) {
        let parts = dmgStr.split('=');
        baseDmgNum = parseFloat(parts[1].trim());
        statsToRender["УРОН"] = `${parts[0]}= <span style="color: #ff4444; text-shadow: 0 0 5px rgba(255,68,68,0.3);">${baseDmgNum}</span>`;
    } else {
        let match = dmgStr.match(/([\d.]+)/);
        baseDmgNum = match ? parseFloat(match[1]) : parseFloat(dmgStr);
        statsToRender["УРОН"] = `<span style="color: #ff4444; text-shadow: 0 0 5px rgba(255,68,68,0.3);">${dmgStr}</span>`;
    }

    // Расчеты Точного и Шокового урона
    if (statsToRender["ТОЧНОЕ ПОПАДАНИЕ"]) {
        let multStr = String(statsToRender["ТОЧНОЕ ПОПАДАНИЕ"]).replace(/[x×]/g, '').trim();
        let multNum = parseFloat(multStr);
        if (!isNaN(multNum)) statsToRender["ТОЧНОЕ ПОПАДАНИЕ"] = `(<span style="color: #ff4444">${baseDmgNum}</span> × ${multNum}) = <span style="color: #ff66b2; text-shadow: 0 0 5px rgba(255,102,178,0.3);">${(baseDmgNum * multNum).toFixed(2)}</span>`;
    }
    if (statsToRender["ШОКОВЫЙ УРОН"]) {
        let multStr = String(statsToRender["ШОКОВЫЙ УРОН"]).replace(/[x×]/g, '').trim();
        let multNum = parseFloat(multStr);
        if (!isNaN(multNum)) statsToRender["ШОКОВЫЙ УРОН"] = `(<span style="color: #ff4444">${baseDmgNum}</span> × ${multNum}) = <span style="color: #ff9800; text-shadow: 0 0 5px rgba(255,152,0,0.3);">${(baseDmgNum * multNum).toFixed(2)}</span>`;
    }
    
    // Для Удара в спину
    if (statsToRender["УДАР В СПИНУ"]) {
        let multStr = String(statsToRender["УДАР В СПИНУ"]).split('(')[0].trim();
        statsToRender["УДАР В СПИНУ"] = `<span style="color: var(--accent); font-weight: 900;">${multStr}</span>`;
    }

    // Для Удара по спящему
    if (statsToRender["УДАР ПО СПЯЩЕМУ"]) {
        let multStr = String(statsToRender["УДАР ПО СПЯЩЕМУ"]).split('(')[0].trim();
        statsToRender["УДАР ПО СПЯЩЕМУ"] = `<span style="color: var(--accent); font-weight: 900;">${multStr}</span>`;
    }

    Object.entries(statsToRender).forEach(([name, val]) => grid.innerHTML += createStatCard(name, val, curWeaponMode));
}

// Управление отображением ползунков и цифрами дистанции
function setupMainSliders() {
    const sBox = document.getElementById('mainSliderBox');
    const rUi = document.getElementById('mainRangedUi');
    const mUi = document.getElementById('mainMeleeUi');
    
    if (curWeaponMode === "ВРАГИ") { sBox.style.display = "none"; return; }
    sBox.style.display = "flex";
    
    if (curWeaponMode === "ОРУЖИЕ БЛИЖНЕГО БОЯ") {
        rUi.style.display = "none"; mUi.style.display = "block";
        if (curWeaponData.n1 !== lastWeaponId) {
            syncSliders('charge', 100);
            lastWeaponId = curWeaponData.n1;
        }
    } else {
        mUi.style.display = "none";
        let falloff = curWeaponData.stats["ДИСТАНЦИЯ СПАДА УРОНА"];
        if (falloff && falloff !== "-" && falloff.includes('/')) {
            rUi.style.display = "block";
            let parts = falloff.replace('М', '').trim().split('/');
            let dStart = parseFloat(parts[0]), dEnd = parseFloat(parts[1]);
            
            // Записываем цифры в главное окно
            document.getElementById('mainDistMin').innerHTML = `<span style="color: var(--accent)">${dStart}</span> <span style="color: var(--text-dim)">М</span>`;
            document.getElementById('mainDistMax').innerHTML = `<span style="color: var(--accent)">${dEnd}</span> <span style="color: var(--text-dim)">М</span>`;
            document.getElementById('mainDistSlider').min = dStart; 
            document.getElementById('mainDistSlider').max = dEnd;
            
            // Записываем те же цифры в окно калькулятора (если он открыт)
            let calcDist = document.getElementById('distSlider'); 
            if (calcDist) { 
                calcDist.min = dStart; 
                calcDist.max = dEnd; 
                let cMin = document.getElementById('distMinSpan');
                let cMax = document.getElementById('distMaxSpan');
                if (cMin) cMin.innerHTML = `<span style="color: var(--accent)">${dStart}</span> <span style="color: var(--text-dim)">М</span>`;
                if (cMax) cMax.innerHTML = `<span style="color: var(--accent)">${dEnd}</span> <span style="color: var(--text-dim)">М</span>`;
            }
            
            if (curWeaponData.n1 !== lastWeaponId) {
                syncSliders('dist', dStart);
                lastWeaponId = curWeaponData.n1;
            }
        } else {
            rUi.style.display = "none"; sBox.style.display = "none";
        }
    }
}

        if(document.getElementById('rangedUi')) document.getElementById('rangedUi').style.display = "none";
        
        let chargePct = parseFloat(document.getElementById('mainChargeSlider').value) / 100;
        let baseMelee = parseFloat(parseMeleeValue(curWeaponData.stats["УРОН"] || "0", chargePct).replace(/[^\d.]/g, '')) || 0;
        let curPrec = parseFloat(parseMeleeValue(curWeaponData.stats["ТОЧНОЕ ПОПАДАНИЕ"] || "1", chargePct).replace(/[^\d.]/g, '')) || 1;
        let curBackBonus = parseFloat(parseMeleeValue(curWeaponData.stats["УДАР В СПИНУ"] || "1", chargePct).replace(/[^\d.]/g, '')) || 1;
        let curSleepBonus = parseFloat(parseMeleeValue(curWeaponData.stats["УДАР ПО СПЯЩЕМУ"] || "1", chargePct).replace(/[^\d.]/g, '')) || 1;
        stunMult = parseFloat(parseMeleeValue(curWeaponData.stats["ШОКОВЫЙ УРОН"] || "1", chargePct).replace(/[^\d.]/g, '')) || 1;
        
        let sleepMult = (document.getElementById('meleeSleep') && document.getElementById('meleeSleep').checked) ? curSleepBonus : 1;

        dmgBody = baseMelee * sleepMult;
        dmgBack = baseMelee * (2 * curBackBonus) * sleepMult;
        dmgHead = (headMult === 1) ? dmgBody : (baseMelee * curPrec * headMult * sleepMult);
        dmgOcciput = (headMult === 1) ? dmgBody * (2 * curBackBonus) : (dmgHead * (2 * curBackBonus));
    } else {
        if(document.getElementById('meleeUi')) document.getElementById('meleeUi').style.display = "none";
        if(document.getElementById('rangedUi')) document.getElementById('rangedUi').style.display = "block";
        
        let baseDmg = typeof curWeaponData.stats["УРОН"] === 'string' ? parseFloat(curWeaponData.stats["УРОН"].replace(/[^\d.]/g, '')) : (curWeaponData.stats["УРОН"] || 0);
        let distMult = 1.0;
        let falloff = curWeaponData.stats["ДИСТАНЦИЯ СПАДА УРОНА"];
        if (falloff && falloff !== "-" && falloff.includes('/')) {
            let parts = falloff.replace('М', '').trim().split('/');
            let dStart = parseFloat(parts[0]), dEnd = parseFloat(parts[1]);
            let currentDist = parseFloat(document.getElementById('mainDistSlider').value);
            distMult = Math.max(0.1, Math.min(1.0, 1.0 - 0.9 * ((currentDist - dStart) / (dEnd - dStart))));
        }
        baseDmg *= distMult;

        let weakMatch = curWeaponData.stats["ТОЧНОЕ ПОПАДАНИЕ"] ? curWeaponData.stats["ТОЧНОЕ ПОПАДАНИЕ"].match(/[x×]([\d.]+)/) : null;
        let weakMult = weakMatch ? parseFloat(weakMatch[1]) : 1;
        let stunMatch = curWeaponData.stats["ШОКОВЫЙ УРОН"] ? curWeaponData.stats["ШОКОВЫЙ УРОН"].match(/[x×]([\d.]+)/) : null;
        stunMult = stunMatch ? parseFloat(stunMatch[1]) : 1;

        dmgBody = baseDmg;
        dmgBack = baseDmg * 2;
        dmgHead = (headMult === 1) ? baseDmg : (baseDmg * weakMult * headMult);
        dmgOcciput = dmgHead * 2;
    }

    function getPageValue(dmg, bodyPart) {
        let stunD = dmg * stunMult;
        let killS = (dmg > 0) ? Math.ceil(enemyHp / dmg) : "-";
        let stunS = (stunD > 0) ? Math.ceil(enemyStunHp / stunD) : "-";
        let pC = (killS === 1) ? "pulse-kill" : (stunS === 1 ? "pulse-stun" : "");
        let title = (window.currentCalcPage === 0) ? `Урон в ${bodyPart}` : ((window.currentCalcPage === 1) ? `Количество ${actionWordGenitive} для убийства в ${bodyPart}` : `Количество ${actionWordGenitive} до стана в ${bodyPart}`);
        let cont = (window.currentCalcPage === 0) ? dmg.toFixed(2) : ((window.currentCalcPage === 1) ? `${killS} <span style="font-size: 9px; color: var(--text-dim);">(${dmg.toFixed(2)})</span>` : (killS === 1 ? "-" : `${stunS} <span style="font-size: 9px; color: var(--text-dim);">(${stunD.toFixed(2)})</span>`));
        return `<div title="${title}">${(pC && cont !== "-") ? `<span class="${pC}">${cont}</span>` : cont}</div>`;
    }

    outGrid.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 10px; padding-bottom: 4px; user-select:none;">
            <div style="cursor: pointer; padding: 2px 8px; color: var(--text-dim); border: 1px solid var(--text-dim); border-radius: 3px;" onclick="window.switchCalcPage(-1)">&#9664;</div>
            <div style="font-weight: 900; color: var(--accent); text-align: center; letter-spacing:0.5px;">${["УРОН", `КОЛИЧЕСТВО ${actionWord} ДЛЯ УБИЙСТВА`, `КОЛИЧЕСТВО ${actionWord} ДО СТАНА`][window.currentCalcPage]}</div>
            <div style="cursor: pointer; padding: 2px 8px; color: var(--text-dim); border: 1px solid var(--text-dim); border-radius: 3px;" onclick="window.switchCalcPage(1)">&#9654;</div>
        </div>
        <div style="font-size: 14px; font-weight: 900; margin-bottom: 8px; text-align: center;">${hpLineText}</div>
        <div class="visual-model">
            <div class="dmg-point dmg-head">${getPageValue(dmgHead, "голову")}</div>
            <div class="dmg-point dmg-body">${getPageValue(dmgBody, "тело")}</div>
            <div class="dmg-point dmg-back">${getPageValue(dmgBack, "спину")}</div>
            <div class="dmg-point dmg-occiput">${getPageValue(dmgOcciput, "затылок")}</div>
        </div>`;
}

function checkCalcAvailability() {
    const overlay = document.getElementById('calcDisabledOverlay');
    if (!overlay) return;
    
    const activeTabBtn = document.querySelector('.tab-btn.active');
    const activeTab = activeTabBtn ? activeTabBtn.innerText : "";

    if (activeTab === "ВРАГИ") {
        overlay.classList.add('visible');
    } else {
        overlay.classList.remove('visible');
    }
}

function toggleCalc() { 
    isCalcOpen = !isCalcOpen; 
    document.getElementById('mainTrain').classList.toggle('open', isCalcOpen);
    document.getElementById('calcBtn').classList.toggle('active', isCalcOpen);
    
    if (isCalcOpen) {
        checkCalcAvailability();
    }
}

function renderNav() {
    const nav = document.getElementById('tabNav'); nav.innerHTML = '';
    Object.keys(database).forEach((c, i) => {
        const btn = document.createElement('div');
        btn.className = `tab-btn ${i===0?'active':''}`;
        btn.innerText = c;
        btn.onclick = () => { 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            renderList(c); 
            
            if (isCalcOpen) {
                checkCalcAvailability();
            }
        };
        nav.appendChild(btn);
    });
}

function renderList(cat) {
    const list = document.getElementById('wList'); 
    list.innerHTML = '';
    list.scrollTop = 0;
    
    database[cat].forEach((item, i) => {
        const div = document.createElement('div');
        
        let extraClass = "";
        const flippedNames = ["WOX COMPACT", "ATTROC TITANIUM", "ISOCO STINGER"];
        if (flippedNames.includes(item.n1)) {
            extraClass = "flipped-weapon";
        }

        div.className = `weapon-item ${i === 0 ? 'active' : ''}`;
        div.innerHTML = `
            <img src="${item.img}" class="list-icon ${extraClass}">
            <div class="item-text">
                <h3>${item.n1}</h3>
                <p>${item.n2 || ''}</p>
            </div>
        `;
        
        div.onclick = () => { 
            document.querySelectorAll('.weapon-item').forEach(el => el.classList.remove('active')); 
            div.classList.add('active'); 
            showInfo(item, cat); 
        };
        
        list.appendChild(div); 
        if(i === 0) showInfo(item, cat);
    });
}

function parseDmg(val) {
    if (typeof val === 'number') return val;
    let match = val.toString().match(/([\d\.]+)\s*[x×]/);
    if (match) return parseFloat(match[1]);
    if (val && val.toString().includes('=')) return parseFloat(val.split('=')[1].trim());
    return parseFloat(val) || 0;
}

function parseStun(val) {
    if (typeof val === 'number') return val;
    let match = val.toString().match(/([\d\.]+)\s*[x×]/);
    if (match) return parseFloat(match[1]);
    if (val && val.toString().includes('(')) {
        match = val.toString().match(/\(([\d.]+)/);
        return match ? parseFloat(match[1]) : 0;
    }
    return parseFloat(val) || 0;
}

if (typeof window.currentCalcPage === 'undefined') {
    window.currentCalcPage = 0;
    window.switchCalcPage = function(dir) {
        window.currentCalcPage += dir;
        if (window.currentCalcPage < 0) window.currentCalcPage = 2;
        if (window.currentCalcPage > 2) window.currentCalcPage = 0;
        updateCalcByEnemy();
    };
}

function autoScaleApp() {
    const wrapper = document.getElementById('scaleWrapper');
    if (!wrapper) return;

    const safeWidth = 1400; 
    const safeHeight = 800; 

    let scale = Math.min(
        window.innerWidth / safeWidth,
        window.innerHeight / safeHeight
    );

    if (scale > 1.1) scale = 1.1;
    if (scale < 0.4) scale = 0.4;

    wrapper.style.transform = `scale(${scale})`;
}

window.addEventListener('resize', autoScaleApp);
autoScaleApp();

const sel = document.getElementById('enemySelect');
sel.innerHTML = '<option value="-1">ВЫБЕРИТЕ ВРАГА</option>';
database["ВРАГИ"].forEach((e, i) => sel.innerHTML += `<option value="${i}">${e.n1}</option>`);

renderNav(); 
renderList("ОСНОВНОЕ ОРУЖИЕ");
</script>
</body>
</html>
