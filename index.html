<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GTFO Database & Damage Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #121212; /* Чуть темнее для контраста со свечением */
            --bg-panel: #1e1e1e;
            --bg-list: #181818;
            --accent: #ffffff;
            --text-dim: #777777;
            --item-height: 85px;
            --calc-width: 340px;
            --main-width: 1020px;
            --main-height: 756px;
            --card-height: 60px; 
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        body {
            background-color: var(--bg-deep);
            color: var(--accent);
            font-family: 'Exo 2', sans-serif;
            height: 100vh; margin: 0;
            display: flex; justify-content: center; align-items: center;
            text-transform: uppercase; overflow: hidden;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.10) 50%);
            background-size: 100% 4px;
            z-index: 9999;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .terminal-layout-train { position: relative; width: var(--main-width); height: var(--main-height); display: flex; }
        .terminal-layout-train.open { transform: translateX(calc(var(--calc-width) / -2)); }

        .main-container { display: flex; flex-direction: column; width: var(--main-width); height: 100%; z-index: 10; flex-shrink: 0; }
        .tabs-nav { display: flex; gap: 4px; height: 42px; }
        .tab-btn { cursor: pointer; padding: 12px 25px; color: var(--text-dim); font-weight: 900; border: 2px solid var(--accent); border-bottom: none; background: var(--bg-panel); font-size: 13px; }
        .tab-btn.active { color: #fff; background: rgba(255,255,255,0.1); box-shadow: inset 0 3px 0 #fff; }

        .main-frame { display: flex; flex: 1; border: 2px solid var(--accent); background: var(--bg-panel); height: calc(100% - 42px); overflow: hidden; position: relative; }

        .weapon-list { width: 300px; border-right: 2px solid var(--accent); overflow-y: auto; background: var(--bg-list); height: 100%; position: relative; z-index: 2; }
        .weapon-item { height: var(--item-height); padding: 0 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .weapon-item .list-icon { width: 45px; opacity: 0.5; filter: grayscale(1); object-fit: contain; transition: none !important; }
        .weapon-item .item-text { display: flex; flex-direction: column; }
        .weapon-item h3 { margin: 0; font-size: 16px; font-weight: 900; line-height: 1.1; }
        .weapon-item p { margin: 2px 0 0 0; font-size: 11px; color: var(--text-dim); font-weight: 900; letter-spacing: 2px; }
        
        .weapon-item.active { background: #333; }
        .weapon-item.active .list-icon { opacity: 1; filter: grayscale(0) drop-shadow(0 0 5px rgba(255,255,255,0.3)); }

        .info-pane { width: 720px; padding: 15px 25px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
        
        .header { margin-bottom: 5px; text-align: center; height: 90px; display: flex; flex-direction: column; justify-content: center; }
        .header h1 { margin: 0; font-size: 38px; font-weight: 900; line-height: 1; letter-spacing: 2px; }
        .header h2 { margin: 2px 0 0 0; font-size: 16px; color: var(--text-dim); letter-spacing: 2px; min-height: 18px; }
        .header h3 { margin: 0px 0 0 0; font-size: 14px; color: var(--text-dim); letter-spacing: 4px; min-height: 16px; font-weight: 600; }

        .icon-target-box { position: relative; padding: 12px; display: inline-flex; }
        .inner-frame { border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4); padding: 10px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .inner-frame img { height: 210px; max-width: 480px; object-fit: contain; transition: none !important; position: relative; z-index: 10; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }

        .corner { position: absolute; width: 14px; height: 14px; border: 4px solid var(--accent); box-shadow: var(--glow); }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }

        .stats-grid { display: grid; gap: 10px; width: 100%; margin-top: auto; }
        .info-pane .stats-grid { grid-template-columns: repeat(3, 1fr); }
        .calc-body .stats-grid { grid-template-columns: 1fr; }

        .stat-card { background: #282828; border: 1px solid #383838; padding: 10px 15px; border-left: 5px solid var(--accent); height: var(--card-height); display: flex; flex-direction: column; justify-content: center; cursor: help; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .stat-name { color: var(--text-dim); font-size: 9px; font-weight: 900; margin-bottom: 2px; }
        .stat-value { color: #fff; font-size: 16px; font-weight: 900; }

        .calc-module { position: absolute; left: 100%; top: 42px; height: 714px; width: var(--calc-width); z-index: 5; transform: translateX(-100%); }
        .terminal-layout-train.open .calc-module { transform: translateX(0); }

        .calc-body { width: 100%; height: 100%; background: var(--bg-list); border: 2px solid var(--accent); border-left: none; padding: 25px; display: flex; flex-direction: column; position: relative; }

        .calc-toggle-btn { position: absolute; left: 100%; top: 50%; transform: translateY(-50%); width: 42px; height: 200px; background: var(--bg-panel); border: 2px solid var(--accent); border-left: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; box-shadow: inset 0 0 0 #fff; }
        .calc-toggle-btn span { writing-mode: vertical-rl; font-weight: 900; font-size: 13px; color: var(--text-dim); letter-spacing: 2px; }
        .calc-toggle-btn.active { background: rgba(255, 255, 255, 0.1); box-shadow: inset -4px 0 0 #fff; }
        .calc-toggle-btn.active span { color: #fff; }

        .form-control { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; font-family: 'Exo 2'; font-weight: 900; width: 100%; outline: none; margin-bottom: 15px; font-size: 12px; text-transform: uppercase; }
        
        #calcEnemyBox { display: none; margin-bottom: 15px; align-self: center; width: fit-content; text-align: center; }
        #calcEnemyBox .inner-frame { padding: 15px; width: 250px; flex-direction: column; }
        #calcEnemyBox .inner-frame img { height: 90px; max-width: 220px; width: auto; }

        .scanner-grid {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 15px 15px; z-index: 1; pointer-events: none;
        }
        .scanner-line {
            position: absolute; left: 0; right: 0; height: 2px;
            background: rgba(255, 255, 255, 0.6); box-shadow: 0 0 10px #fff;
            z-index: 5; pointer-events: none; animation: scan 2.5s linear infinite;
        }
        @keyframes scan {
            0% { top: -5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 105%; opacity: 0; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        .flipped-weapon { transition: none !important; transform: rotate(120deg) scale(1.1) !important; }
        .list-icon { transition: none !important; }
        #mainImg { transition: none !important; }

        .calc-section { margin-bottom: 18px; width: 100%; }
        .slider-header { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-align: center; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .slider-header span { color: #fff; }
        .slider-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); font-weight: 900; }
        .slider-row span { width: 45px; text-align: center; flex-shrink: 0; }
        
        .custom-slider { -webkit-appearance: none; flex: 1; height: 4px; background: #444; outline: none; border-radius: 2px; }
        .custom-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: var(--glow); }
		
        .visual-model {
            position: relative;
            width: 100%;
            height: 280px;
            background: url('img/striker_mask.png') center/contain no-repeat;
        }
        .dmg-point {
            position: absolute;
            font-size: 16px;
            font-weight: 900;
            text-align: center;
        }
		
        .dmg-body { color: #a8f778; top: 150px; left: 75px; transform: translate(-50%, -50%); } 
        .dmg-head { color: #f77878; top: 50px; left: 75px; transform: translate(-50%, -50%); } 
        .dmg-back { color: #ffe258; top: 150px; left: 215px; transform: translate(-50%, -50%); }
        .dmg-occiput { color: #c378f7; top: 50px; left: 215px; transform: translate(-50%, -50%); }
		
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(220, 50, 50, 0.5); border-color: rgba(220, 50, 50, 0.9); }
            70% { box-shadow: 0 0 0 5px rgba(220, 50, 50, 0); border-color: rgba(220, 50, 50, 0.3); }
            100% { box-shadow: 0 0 0 0 rgba(220, 50, 50, 0); border-color: rgba(220, 50, 50, 0.9); }
        }

        @keyframes pulseBlue {
            0% { box-shadow: 0 0 0 0 rgba(50, 150, 255, 0.5); border-color: rgba(50, 150, 255, 0.9); }
            70% { box-shadow: 0 0 0 5px rgba(50, 150, 255, 0); border-color: rgba(50, 150, 255, 0.3); }
            100% { box-shadow: 0 0 0 0 rgba(50, 150, 255, 0); border-color: rgba(50, 150, 255, 0.9); }
        }

        .pulse-kill {
            border: 1px solid rgba(220, 50, 50, 0.8);
            background: rgba(220, 50, 50, 0.1);
            animation: pulseRed 1.5s infinite;
            padding: 2px 5px;
            border-radius: 4px;
            display: inline-block;
        }

        .pulse-stun {
            border: 1px solid rgba(50, 150, 255, 0.8);
            background: rgba(50, 150, 255, 0.1);
            animation: pulseBlue 1.5s infinite;
            padding: 2px 5px;
            border-radius: 4px;
            display: inline-block;
        }
		
        .calc-legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 5px;
            font-size: 9px;
            color: var(--text-dim);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .mini-box {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
		
		/* --- ЗАГЛУШКА КАЛЬКУЛЯТОРА --- */
        .calc-disabled-overlay {
            display: none; /* Скрыто по умолчанию */
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-list);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .calc-disabled-overlay.visible {
            display: flex; /* Показывается, когда добавляем класс .visible */
        }
    </style>
</head>
<body>

<div class="crt-overlay"></div> 
    <div id="scaleWrapper" style="transform-origin: center center; display: flex; justify-content: center; align-items: center;">
        <div id="mainTrain" class="terminal-layout-train">
        <div class="main-container">
            <div class="tabs-nav" id="tabNav"></div>
            <div class="main-frame">
                <div id="wList" class="weapon-list"></div>
                <div class="info-pane">
                    <div class="header">
                        <h1 id="n1">-</h1>
                        <h2 id="n2">-</h2>
                        <h3 id="n3"></h3>
                    </div>
                    <div class="icon-target-box">
                        <div class="corner tl"></div><div class="corner tr"></div>
                        <div class="inner-frame"><img id="mainImg" src=""></div>
                        <div class="corner bl"></div><div class="corner br"></div>
                    </div>
                    <div id="statsGrid" class="stats-grid"></div>
                </div>
            </div>
        </div>

        <div class="calc-module">
            <div id="calcBtn" class="calc-toggle-btn" onclick="toggleCalc()"><span>РАСЧЕТ УРОНА</span></div>
            <div class="calc-body">
			<div id="calcDisabledOverlay" class="calc-disabled-overlay">
                    <div style="font-size: 40px; margin-bottom: 20px; opacity: 0.5;">⚠</div>
                    <div style="font-weight: 900; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px;">КАЛЬКУЛЯТОР НЕДОСТУПЕН</div>
                    <div style="font-size: 11px; color: var(--text-dim); line-height: 1.5;">В режиме справочника врагов расчеты не производятся.</div>
                    <div style="font-size: 9px; margin-top: 20px; opacity: 0.4;">ВЫБЕРИТЕ КАТЕГОРИЮ ОРУЖИЯ</div>
                </div>
                <select id="enemySelect" class="form-control" onchange="updateCalcByEnemy()"></select>
            
                <div id="calcEnemyBox" class="icon-target-box">
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="inner-frame" id="enemyFrameContent"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                </div>

                <div id="rangedUi" style="display: none; width: 100%;">
                    <div id="distContainer" class="calc-section">
                        <div class="slider-header">ДИСТАНЦИЯ ДО ВРАГА: <span id="distValDisplay"></span> М</div>
                        <div class="slider-row">
                            <span id="distMinSpan"></span>
                            <input type="range" id="distSlider" min="0" max="100" value="0" class="custom-slider" oninput="updateCalcByEnemy()">
                            <span id="distMaxSpan"></span>
                        </div>
                    </div>
                </div>

                <div id="meleeUi" style="display: none; width: 100%;">
                    <div class="calc-section">
                        <div class="slider-header">ЗАРЯДКА: <span id="chargeValDisplay">100</span> %</div>
                        <div class="slider-row">
                            <span>0 %</span>
                            <input type="range" id="meleeCharge" min="0" max="100" value="100" class="custom-slider" oninput="updateCalcByEnemy()">
                            <span>100 %</span>
                        </div>
                    </div>

                    <div class="calc-section">
                        <label style="font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #fff; font-weight: 900; letter-spacing: 1px;">
                            <input type="checkbox" id="meleeSleep" onchange="updateCalcByEnemy()" style="width: 16px; height: 16px; accent-color: var(--accent);"> УДАР ПО СПЯЩЕМУ
                        </label>
                    </div>
                </div>

                <div id="calcOutputs" class="stats-grid"></div>
            </div>
        </div>
    </div>
</div>

		{ n1: "CHARGER SCOUT", n2: "ЧАРДЖЕР СКАУТ", n3: "УНИКАЛЬНЫЙ ВРАГ", headMult: 1, img: "img/Enemies/Charger Scout.webp", stats: { "ЗДОРОВЬЕ": "60", "СТОЙКОСТЬ": "5", "УРОН": "12% УДАРОМ", "СКОРОСТЬ": "СРЕДНЯЯ", "ОПАСНОСТЬ": "ВЫСОКАЯ" } },
		{ n1: "SHADOW", n2: "ТЕНЬ", n3: "УНИКАЛЬНЫЙ ВРАГ", headMult: 3, img: "img/Enemies/Shadow.webp", stats: { "ЗДОРОВЬЕ": "20", "СТОЙКОСТЬ": "5", "УРОН": "12% ЯЗЫКОМ", "СКОРОСТЬ": "НИЗКАЯ", "ОПАСНОСТЬ": "СРЕДНЯЯ" } },
		{ n1: "BIG SHADOW", n2: "БОЛЬШАЯ ТЕНЬ", n3: "УНИКАЛЬНЫЙ ВРАГ", headMult: 1.5, img: "img/Enemies/Big Shadow.webp", stats: { "ЗДОРОВЬЕ": "120", "СТОЙКОСТЬ": "40", "УРОН": "40% УДАРОМ/24% ЯЗЫКОМ", "СКОРОСТЬ": "ВЫСОКАЯ", "ОПАСНОСТЬ": "ОЧЕНЬ ВЫСОКАЯ" } },
		{ n1: "SHADOW SCOUT", n2: "ТЕНЕВОЙ СКАУТ", n3: "УНИКАЛЬНЫЙ ВРАГ", headMult: 3, img: "img/Enemies/Shadow Scout.webp", stats: { "ЗДОРОВЬЕ": "42", "СТОЙКОСТЬ": "5", "УРОН": "4% СНАРЯДОМ", "СКОРОСТЬ": "НИЗКАЯ/СРЕДНЯЯ", "ОПАСНОСТЬ": "ВЫСОКАЯ" } }
    ]
};

function createStatCard(name, value) {
    const hint = descriptions[name] || "";
    return `
        <div class="stat-card" title="${hint}">
            <div class="stat-name">${name}</div>
            <div class="stat-value">${value}</div>
        </div>`;
}

// Функция для проверки доступности калькулятора
function checkCalcAvailability() {
    const overlay = document.getElementById('calcDisabledOverlay');
    if (!overlay) return;
    
    const activeTabBtn = document.querySelector('.tab-btn.active');
    const activeTab = activeTabBtn ? activeTabBtn.innerText : "";

    if (activeTab === "ВРАГИ") {
        overlay.classList.add('visible'); // Показываем заглушку
    } else {
        overlay.classList.remove('visible'); // Прячем заглушку
    }
}

function toggleCalc() { 
    isCalcOpen = !isCalcOpen; 
    document.getElementById('mainTrain').classList.toggle('open', isCalcOpen);
    document.getElementById('calcBtn').classList.toggle('active', isCalcOpen);
    
    // Проверяем доступность при открытии
    if (isCalcOpen) {
        checkCalcAvailability();
    }
}

function renderNav() {
    const nav = document.getElementById('tabNav'); nav.innerHTML = '';
    Object.keys(database).forEach((c, i) => {
        const btn = document.createElement('div');
        btn.className = `tab-btn ${i===0?'active':''}`;
        btn.innerText = c;
        btn.onclick = () => { 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            renderList(c); 
            
            // Если калькулятор открыт в момент смены вкладки — проверяем, нужно ли показать заглушку
            if (isCalcOpen) {
                checkCalcAvailability();
            }
        };
        nav.appendChild(btn);
    });
}

function renderList(cat) {
    const list = document.getElementById('wList'); 
    list.innerHTML = '';
    list.scrollTop = 0;
    
    database[cat].forEach((item, i) => {
        const div = document.createElement('div');
        
        let extraClass = "";
        const flippedNames = ["WOX COMPACT", "ATTROC TITANIUM", "ISOCO STINGER"];
        if (flippedNames.includes(item.n1)) {
            extraClass = "flipped-weapon";
        }

        div.className = `weapon-item ${i === 0 ? 'active' : ''}`;
        div.innerHTML = `
            <img src="${item.img}" class="list-icon ${extraClass}">
            <div class="item-text">
                <h3>${item.n1}</h3>
                <p>${item.n2 || ''}</p>
            </div>
        `;
        
        div.onclick = () => { 
            document.querySelectorAll('.weapon-item').forEach(el => el.classList.remove('active')); 
            div.classList.add('active'); 
            showInfo(item, cat); 
        };
        
        list.appendChild(div); 
        if(i === 0) showInfo(item, cat);
    });
}

function showInfo(obj, cat) {
    curWeaponMode = cat; 
    curWeaponData = obj;
    document.getElementById('n1').innerText = obj.n1;
    document.getElementById('n2').innerText = obj.n2 || ""; 
    document.getElementById('n3').innerText = obj.n3 || ""; 
    
    const mainImg = document.getElementById('mainImg');
    mainImg.src = obj.img;

    const flippedNames = ["WOX COMPACT", "ATTROC TITANIUM", "ISOCO STINGER"];
    if (flippedNames.includes(obj.n1)) {
        mainImg.classList.add('flipped-weapon');
    } else {
        mainImg.classList.remove('flipped-weapon');
    }

    const grid = document.getElementById('statsGrid'); 
    grid.innerHTML = '';
    Object.entries(obj.stats).forEach(([name, val]) => { 
        grid.innerHTML += createStatCard(name, val); 
    });
    
    updateCalcByEnemy();
}

function parseDmg(val) {
    if (typeof val === 'number') return val;
    let match = val.toString().match(/([\d\.]+)\s*[x×]/);
    if (match) return parseFloat(match[1]);
    if (val && val.toString().includes('=')) return parseFloat(val.split('=')[1].trim());
    return parseFloat(val) || 0;
}

function parseStun(val) {
    if (typeof val === 'number') return val;
    let match = val.toString().match(/([\d\.]+)\s*[x×]/);
    if (match) return parseFloat(match[1]);
    if (val && val.toString().includes('(')) {
        match = val.toString().match(/\(([\d.]+)/);
        return match ? parseFloat(match[1]) : 0;
    }
    return parseFloat(val) || 0;
}

// Глобальная навигация для страниц калькулятора
if (typeof window.currentCalcPage === 'undefined') {
    window.currentCalcPage = 0;
    window.switchCalcPage = function(dir) {
        window.currentCalcPage += dir;
        if (window.currentCalcPage < 0) window.currentCalcPage = 2;
        if (window.currentCalcPage > 2) window.currentCalcPage = 0;
        updateCalcByEnemy();
    };
}

    // Автоматическое масштабирование интерфейса
function autoScaleApp() {
    const wrapper = document.getElementById('scaleWrapper');
    if (!wrapper) return;

    // Задаем базовые "безопасные" размеры. 
    // Учитываем ширину базы (1020) + ширину открытого калькулятора (340) + небольшие отступы.
    const safeWidth = 1400; 
    const safeHeight = 800; 

    // Высчитываем коэффициент масштабирования
    let scale = Math.min(
        window.innerWidth / safeWidth,
        window.innerHeight / safeHeight
    );

    // Ограничиваем масштаб: не увеличиваем больше 1.1x (чтобы на 4K не было гигантским)
    // и не уменьшаем меньше 0.4x (чтобы оставалось читаемым)
    if (scale > 1.1) scale = 1.1;
    if (scale < 0.4) scale = 0.4;

    // Применяем масштаб
    wrapper.style.transform = `scale(${scale})`;
}

// Запускаем пересчет при загрузке страницы и при каждом изменении размера окна
window.addEventListener('resize', autoScaleApp);
autoScaleApp();

function updateCalcByEnemy() {
    const enemySelect = document.getElementById('enemySelect');
    if (!enemySelect) return;

    const enemyIdx = enemySelect.value;
    if (enemyIdx === "-1") {
        document.getElementById('calcEnemyBox').style.display = "none";
        document.getElementById('meleeUi').style.display = "none";
        document.getElementById('rangedUi').style.display = "none";
        document.getElementById('calcOutputs').innerHTML = "";
        return;
    }

    const enemy = database["ВРАГИ"][enemyIdx];
    if (!enemy) return;

    //     // Логика минимализма для интерфейса оружия ближнего боя
    let sleepBtn = document.getElementById('meleeSleep');
    if (sleepBtn) {
        // Уменьшаем шрифт описания чекбокса
        sleepBtn.parentElement.style.fontSize = "10px";
        if (typeof awakeEnemies !== 'undefined' && awakeEnemies.includes(enemy.n1)) {
            sleepBtn.checked = false; 
            sleepBtn.disabled = true;
            sleepBtn.parentElement.style.opacity = "0.4";
        } else {
            sleepBtn.disabled = false;
            sleepBtn.parentElement.style.opacity = "1";
        }
    }

    const outGrid = document.getElementById('calcOutputs');
    const cBox = document.getElementById('calcEnemyBox');
    const mUi = document.getElementById('meleeUi');
    const rUi = document.getElementById('rangedUi');
    
    outGrid.innerHTML = '';
    cBox.style.display = "flex";

    const activeTabBtn = document.querySelector('.tab-btn.active');
    const activeTab = activeTabBtn ? activeTabBtn.innerText : "";

    let enemyHp = parseFloat(enemy.stats["ЗДОРОВЬЕ"]) || 0;
    let enemyStunHp = parseFloat(enemy.stats["СТОЙКОСТЬ"]) || 0;
    let headMult = enemy.headMult || 1; 

    let isMelee = (activeTab === "ОРУЖИЕ БЛИЖНЕГО БОЯ");
    let actionWord = isMelee ? "УДАРОВ" : "ПУЛЬ";
    let actionWordGenitive = isMelee ? "ударов" : "пуль";
    
    let pageTitles = [
        "УРОН",
        `КОЛИЧЕСТВО ${actionWord} ДЛЯ УБИЙСТВА`,
        `КОЛИЧЕСТВО ${actionWord} ДО СТАНА`
    ];

    let hpLineText = "";
    if (window.currentCalcPage === 2) {
        hpLineText = `<span style="color: var(--text-dim)">СТОЙКОСТЬ: </span><span style="color: var(--accent)">${enemyStunHp}</span> <span style="color: var(--text-dim)">HP</span>`;
    } else {
        hpLineText = `<span style="color: var(--text-dim)">ЗДОРОВЬЕ: </span><span style="color: var(--accent)">${enemyHp}</span> <span style="color: var(--text-dim)">HP</span>`;
    }

    // Рендер верхней части
    document.getElementById('enemyFrameContent').innerHTML = `
        <div class="scanner-grid"></div>
        <div class="scanner-line"></div>
        <img src="${enemy.img}" style="width:100%; height:80px; object-fit:contain; margin-bottom:6px; position:relative; z-index:2;">
        <div style="font-size:14px; font-weight:900; position:relative; z-index:10;">${enemy.n1}</div>
        <div style="font-size:10px; color:var(--text-dim); position:relative; z-index:10; margin-bottom:4px;">${enemy.n2 || ''}</div>
        
        <div class="calc-legend">
            <div class="legend-item"><div class="mini-box" style="background:rgba(220,50,50,0.6); border:1px solid #dc3232;"></div><span>ВАНШОТ</span></div>
            <div class="legend-item"><div class="mini-box" style="background:rgba(50,150,255,0.6); border:1px solid #3296ff;"></div><span>СТАН</span></div>
        </div>
    `;

    let dmgHead = 0, dmgBody = 0, dmgBack = 0, dmgOcciput = 0;
    let stunMult = 1;

    if (isMelee) {
        if (mUi) mUi.style.display = "block";
        if (rUi) rUi.style.display = "none";
        
        // Настройка процентов зарядки
        document.getElementById('meleeCharge').previousElementSibling.innerHTML = 
            `<span style="color:var(--accent)">0</span><span style="color:var(--text-dim)">%</span>`;
        document.getElementById('meleeCharge').nextElementSibling.innerHTML = 
            `<span style="color:var(--accent)">100</span><span style="color:var(--text-dim)">%</span>`;

        let chargeVal = parseFloat(document.getElementById('meleeCharge').value);
        document.getElementById('chargeValDisplay').innerText = chargeVal;
        let chargePct = chargeVal / 100;
        let baseMelee = (curWeaponData.meleeData.fast || 0) + ((curWeaponData.meleeData.charged || 0) - (curWeaponData.meleeData.fast || 0)) * chargePct;
        let curPrec = (curWeaponData.meleeData.precFast || 1) + ((curWeaponData.meleeData.precCharged || 1) - (curWeaponData.meleeData.precFast || 1)) * chargePct; 
        let curBackBonus = (curWeaponData.meleeData.backFast || 1) + ((curWeaponData.meleeData.backCharged || 1) - (curWeaponData.meleeData.backFast || 1)) * chargePct; 
        let sleepMult = document.getElementById('meleeSleep').checked ? ((curWeaponData.meleeData.sleepFast || 1) + ((curWeaponData.meleeData.sleepCharged || 1) - (curWeaponData.meleeData.sleepFast || 1)) * chargePct) : 1;
        let stunMatch = curWeaponData.stats["ШОКОВЫЙ УРОН"] ? curWeaponData.stats["ШОКОВЫЙ УРОН"].match(/[x×]([\d.]+)/) : null;
        stunMult = stunMatch ? parseFloat(stunMatch[1]) : 1;
        
        dmgBody = baseMelee * sleepMult;
        dmgBack = baseMelee * (2 * curBackBonus) * sleepMult;
        dmgHead = (headMult === 1) ? dmgBody : (baseMelee * curPrec * headMult * sleepMult);
        dmgOcciput = (headMult === 1) ? dmgBody * (2 * curBackBonus) : (dmgHead * (2 * curBackBonus));
    } else {
        if (mUi) mUi.style.display = "none";
        if (rUi) rUi.style.display = "block";
        let baseDmg = parseDmg(curWeaponData.stats["УРОН"]);
        
        let distSlider = document.getElementById('distSlider');
        let falloff = curWeaponData.stats["ДИСТАНЦИЯ СПАДА УРОНА"];
        if (falloff && falloff !== "-") {
            let parts = falloff.replace('М', '').trim().split('/');
            let dStart = parseFloat(parts[0]), dEnd = parseFloat(parts[1]);
            document.getElementById('distContainer').style.display = "block";
            document.getElementById('distMinSpan').innerHTML = `<span style="color: var(--accent)">${dStart}</span> <span style="color: var(--text-dim)">М</span>`;
            document.getElementById('distMaxSpan').innerHTML = `<span style="color: var(--accent)">${dEnd}</span> <span style="color: var(--text-dim)">М</span>`;
            
            if (curWeaponData.n1 !== window.lastWeaponId) {
                window.lastWeaponId = curWeaponData.n1;
                distSlider.min = dStart;
                distSlider.max = dEnd;
                distSlider.value = dStart;
            }
            let currentDist = parseFloat(distSlider.value);
            let distMult = Math.max(0.1, Math.min(1.0, 1.0 - 0.9 * ((currentDist - dStart) / (dEnd - dStart))));
            baseDmg *= distMult;
            document.getElementById('distValDisplay').innerText = currentDist;
        } else {
            document.getElementById('distContainer').style.display = "none";
        }

        let weakMatch = curWeaponData.stats["ТОЧНОЕ ПОПАДАНИЕ"] ? curWeaponData.stats["ТОЧНОЕ ПОПАДАНИЕ"].match(/[x×]([\d.]+)/) : null;
        let weakMult = weakMatch ? parseFloat(weakMatch[1]) : 1;
        let stunMatch = curWeaponData.stats["ШОКОВЫЙ УРОН"] ? curWeaponData.stats["ШОКОВЫЙ УРОН"].match(/[x×]([\d.]+)/) : null;
        stunMult = stunMatch ? parseFloat(stunMatch[1]) : 1;

        dmgBody = baseDmg;
        dmgBack = baseDmg * 2;
        dmgHead = (headMult === 1) ? baseDmg : (baseDmg * weakMult * headMult);
        dmgOcciput = dmgHead * 2;
    }

    // Функция форматирования точки с описанием
    function getPageValue(dmg, bodyPart) {
        let stunD = dmg * stunMult;
        let killS = (dmg > 0) ? Math.ceil(enemyHp / dmg) : "-";
        let stunS = (stunD > 0) ? Math.ceil(enemyStunHp / stunD) : "-";

        let pulseClass = "";
        if (killS === 1) pulseClass = "pulse-kill";
        else if (stunS === 1) pulseClass = "pulse-stun";

        let titleText = "";
        let content = "";

        if (window.currentCalcPage === 0) {
            titleText = `Урон в ${bodyPart}`;
            content = dmg.toFixed(2);
        } else if (window.currentCalcPage === 1) {
            titleText = `Количество ${actionWordGenitive} для убийства в ${bodyPart}`;
            content = `${killS} <span style="font-size: 9px; color: var(--text-dim);">(${dmg.toFixed(2)})</span>`;
        } else {
            titleText = `Количество ${actionWordGenitive} до стана в ${bodyPart}`;
            if (killS === 1) content = "-"; 
            else content = `${stunS} <span style="font-size: 9px; color: var(--text-dim);">(${stunD.toFixed(2)})</span>`;
        }

        let innerHtml = pulseClass && content !== "-" ? `<span class="${pulseClass}">${content}</span>` : content;
        return `<div title="${titleText}">${innerHtml}</div>`;
    }

    outGrid.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 10px; padding-bottom: 4px; user-select:none;">
            <div style="cursor: pointer; padding: 2px 8px; color: var(--text-dim); border: 1px solid var(--text-dim); border-radius: 3px;" onclick="window.switchCalcPage(-1)">&#9664;</div>
            <div style="font-weight: 900; color: var(--accent); text-align: center; letter-spacing:0.5px;">${pageTitles[window.currentCalcPage]}</div>
            <div style="cursor: pointer; padding: 2px 8px; color: var(--text-dim); border: 1px solid var(--text-dim); border-radius: 3px;" onclick="window.switchCalcPage(1)">&#9654;</div>
        </div>
        <div style="font-size: 14px; font-weight: 900; margin-bottom: 8px; text-align: center;">${hpLineText}</div>
        <div class="visual-model">
            <div class="dmg-point dmg-head">${getPageValue(dmgHead, "голову")}</div>
            <div class="dmg-point dmg-body">${getPageValue(dmgBody, "тело")}</div>
            <div class="dmg-point dmg-back">${getPageValue(dmgBack, "спину")}</div>
            <div class="dmg-point dmg-occiput">${getPageValue(dmgOcciput, "затылок")}</div>
        </div>
    `;
}


const sel = document.getElementById('enemySelect');
sel.innerHTML = '<option value="-1">ВЫБЕРИТЕ ВРАГА</option>';
database["ВРАГИ"].forEach((e, i) => sel.innerHTML += `<option value="${i}">${e.n1}</option>`);

renderNav(); 
renderList("ОСНОВНОЕ ОРУЖИЕ");
</script>
